services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: warmingtea_prod
      POSTGRES_USER: warmingtea
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    # Порт нужен локально для nginx (проксирует /files → 127.0.0.1:9000)
    ports:
      - "127.0.0.1:9000:9000"
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      # База данных
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: warmingtea
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: warmingtea_prod
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRES_IN: 7d
      # MinIO
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_PUBLIC_URL: https://manager.warmingtea.su/files
      # CORS
      CORS_ORIGIN: https://manager.warmingtea.su
      # Admin
      ADMIN_SECRET: ${ADMIN_SECRET}
      # Google OAuth (публичный client id)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://manager.warmingtea.su/api
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  miniodata:
